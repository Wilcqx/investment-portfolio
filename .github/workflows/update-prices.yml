name: Daily Portfolio Price Refresh

on:
  schedule:
    # 08:00 Singapore Time = 00:00 UTC
    - cron: "0 0 * * *"

    # 17:00 Singapore Time = 09:00 UTC
    - cron: "0 9 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh market prices
        run: python update_prices.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --cached --quiet; then
            echo "No price changes to commit."
          else
            git commit -m "Daily portfolio price refresh"
            git push
          fi
